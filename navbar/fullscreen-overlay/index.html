<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<title>Fullscreen Overlay Navbar</title>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">MONO</a>
    <button class="toggle" id="toggle">
      <span></span><span></span>
    </button>
  </nav>

  <div class="overlay" id="overlay">
    <ul class="overlay-links">
      <li><a href="#" style="--i:0">Home</a></li>
      <li><a href="#" style="--i:1">Work</a></li>
      <li><a href="#" style="--i:2">Studio</a></li>
      <li><a href="#" style="--i:3">Journal</a></li>
      <li><a href="#" style="--i:4">Contact</a></li>
    </ul>
  </div>

  <main class="hero">
    <h1>Fullscreen Overlay</h1>
    <p>Click the toggle top-right — a fullscreen menu fades in with links staggering upward one after another.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
