<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<title>Hamburger Menu</title>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">Fold</a>
    <button class="burger" id="burger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="menu" id="menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">Pricing</a></li>
      <li><a href="#">Contact</a></li>

  <main class="hero">
    <h1>Hamburger Menu</h1>
    <p>Resize below ~700px (or just view on mobile) to see the burger icon appear. Tap it — icon morphs into an X and the menu drops down.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
