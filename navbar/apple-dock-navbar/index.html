<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<title>Apple Dock Style Navbar</title>
</head>
<body>
  <main class="hero">
    <h1>Apple Dock Style Navbar</h1>
    <p>Move your mouse across the dock below — icons scale up based on cursor proximity, just like macOS.</p>
  </main>

  <div class="dock-wrap">
    <nav class="dock" id="dock">
      <a href="#" class="dock-item" data-label="Home">🏠</a>
      <a href="#" class="dock-item" data-label="Search">🔍</a>
      <a href="#" class="dock-item" data-label="Messages">💬</a>
      <a href="#" class="dock-item" data-label="Photos">🖼️</a>
      <a href="#" class="dock-item" data-label="Music">🎵</a>
      <a href="#" class="dock-item" data-label="Settings">⚙️</a>
      <a href="#" class="dock-item" data-label="Mail">✉️</a>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
