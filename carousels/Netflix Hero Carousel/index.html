<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Netflix Hero Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-fade"></div>
    <div class="hero-content">
      <p class="hero-eyebrow" id="heroEyebrow"></p>
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-buttons">
        <button class="btn play">&#9654; Play</button>
        <button class="btn more">&#8505; More Info</button>
      </div>
    </div>

    <div class="thumb-row" id="thumbRow"></div>
  </div>
<script src="script.js"></script>
</body>
</html>
