<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Marquee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="theatre">
    <!-- <div class="bulbs top"></div> -->
    <h1 class="marquee-title">NOW SHOWING</h1>

    <div class="track-row">
      <div class="track" id="trackA"></div>
    </div>
    <div class="track-row reverse">
      <div class="track" id="trackB"></div>
    </div>

    <!-- <div class="bulbs bottom"></div> -->
    <button id="toggle" class="pause-btn">Pause reels</button>
  </div>
<script src="script.js"></script>
</body>
</html>
