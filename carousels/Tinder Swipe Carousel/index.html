<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tinder Swipe Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-bar">
      <span class="logo">flick.</span>
    </header>
    <div class="deck" id="deck"></div>
    <div class="action-row">
      <button id="nope" class="action nope" aria-label="Nope">&#10005;</button>
      <button id="rewind" class="action rewind" aria-label="Rewind">&#8634;</button>
      <button id="like" class="action like" aria-label="Like">&#9825;</button>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
