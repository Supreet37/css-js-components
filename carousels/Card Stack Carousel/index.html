<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Stack Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="desk">
    <p class="label">Postcards from the archive</p>
    <div class="stack" id="stack"></div>
    <div class="controls">
      <button id="prev" class="btn">&#8634; Back</button>
      <button id="next" class="btn primary">Shuffle &#8635;</button>
    </div>
  </main>
<script src="script.js"></script>
</body>
</html>
