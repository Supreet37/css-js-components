<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circular 3D Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="void">
    <p class="kicker">Turn the ring</p>
    <div class="ring-stage">
      <div class="ring" id="ring"></div>
      <div class="floor"></div>
    </div>
    <div class="controls">
      <button id="prev" class="rot-btn" aria-label="Rotate left">&#8635;</button>
      <h2 id="label">—</h2>
      <button id="next" class="rot-btn" aria-label="Rotate right">&#8634;</button>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
