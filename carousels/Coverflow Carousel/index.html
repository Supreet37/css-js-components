<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coverflow Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <p class="eyebrow">TAP ON THE CARDS TO FEEL SLIDER TYPE </p>
    <div class="coverflow" id="coverflow"></div>
    <div class="deck-info">
      <h1 id="trackTitle">—</h1>
      <p class="counter"><span id="trackIndex">01</span> / <span id="trackTotal">07</span></p>
    </div>
    <div class="controls">
      <button id="prev" class="nav-btn" aria-label="Previous">&#8592;</button>
      <button id="next" class="nav-btn" aria-label="Next">&#8594;</button>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
